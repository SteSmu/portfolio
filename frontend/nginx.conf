# nginx config for the portfolio SPA in production.
# Serves the static dist + proxies /api to the FastAPI container.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets (vite emits content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the FastAPI service. Hostname `pt-api` matches the
    # service name in docker-compose.prod.yml.
    location /api/ {
        proxy_pass http://pt-api:8430;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering off;
    }

    # SPA fallback — every non-asset, non-/api path returns index.html so the
    # React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't log the noisy health probes
    location = /api/health {
        access_log off;
        proxy_pass http://pt-api:8430/api/health;
    }
}
